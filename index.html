<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsiDagger - Polymer Engineering</title>
  <meta name="description" content="PsiDagger - The one-stop-shop for all polymer engineering. Better-performing polymers, much faster.">

  <!-- Open Graph (Facebook, LinkedIn, iMessage, etc.) -->
  <meta property="og:title" content="PsiDagger - Polymer Engineering">
  <meta property="og:description" content="The one-stop-shop for all polymer engineering — better-performing polymers, much faster, outcompeting incumbents across multiple industries.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://psidagger.com">
  <meta property="og:image" content="https://psidagger.com/og-image.png">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PsiDagger - Polymer Engineering">
  <meta name="twitter:description" content="The one-stop-shop for all polymer engineering — better-performing polymers, much faster.">
  <meta name="twitter:image" content="https://psidagger.com/og-image.png">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Section 1: Fullscreen hero -->
  <section class="hero" id="hero">
    <video class="hero-media" autoplay muted loop playsinline poster="image/poster.png">
      <source src="hero.mp4" type="video/mp4">
    </video>

    <a class="scroll-hint" href="#polyformer" aria-label="Scroll to Polyformer section">
      <span class="scroll-arrow">&#8595;</span>
    </a>
  </section>

  <!-- Section 2: Polyformer -->
  <section class="polyformer" id="polyformer">
    <div class="polyformer-content">
      <p class="polyformer-tagline">A paradigm shift in polymer engineering coming soon&hellip;</p>

      <div class="polyformer-viewers">
        <figure class="viewer-card">
          <video class="viewer" autoplay muted loop playsinline preload="metadata">
            <source src="video/polyformer_320K.mp4" type="video/mp4">
          </video>
        </figure>
        <figure class="viewer-card">
          <video class="viewer" autoplay muted loop playsinline preload="metadata">
            <source src="video/polyformer_450K.mp4" type="video/mp4">
          </video>
        </figure>
      </div>

      <a class="contact-btn" href="mailto:info@psidagger.ai">info@psidagger.ai</a>
    </div>
  </section>

  <!-- Logo (always visible) -->
  <div class="logo">
    <img class="logo-img" src="image/logo.png" alt="PsiDagger">
  </div>

  <script>
  (function () {
    var video = document.querySelector('.hero-media');
    var hint  = document.querySelector('.scroll-hint');

    function positionArrow() {
      if (!video.videoWidth) return;
      var hero       = video.parentElement;
      var videoRatio = video.videoWidth / video.videoHeight;
      var heroRatio  = hero.clientWidth / hero.clientHeight;

      if (videoRatio > heroRatio) {
        var renderedHeight = hero.clientWidth / videoRatio;
        var gap = (hero.clientHeight - renderedHeight) / 2;
        hint.style.bottom = Math.max(gap / 2, 16) + 'px';
      } else {
        hint.style.bottom = '2rem';
      }
    }

    video.addEventListener('loadedmetadata', positionArrow);
    window.addEventListener('resize', positionArrow);
    if (video.videoWidth) positionArrow();
  })();
  </script>

</body>
</html>
